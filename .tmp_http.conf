[general]
enabled=yes
bindaddr=0.0.0.0
bindport=8088
tlsenable=yes
tlsbindaddr=0.0.0.0:8089
tlscertfile=/etc/letsencrypt/live/pbx.texacore.ai/fullchain.pem
tlsprivatekey=/etc/letsencrypt/live/pbx.texacore.ai/privkey.pem
; Keep WebSocket connections alive much longer
sessionlimit=86400
session_inactivity=0
session_keep_alive=30
