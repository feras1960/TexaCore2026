; ══════════════════════════════════════════════════
; NexaTalkie — ConfBridge Configuration
; Push-to-Talk Conference Profiles
; ══════════════════════════════════════════════════

; ─── Bridge Profile ───
; Optimized for PTT: no sounds, low-latency mixing
[ptt_bridge]
type=bridge
max_members=50
mixing_interval=20
video_mode=none
; Disable all join/leave sounds for instant PTT experience
sound_join=
sound_leave=
sound_has_joined=
sound_has_left=
sound_kicked=
sound_muted=
sound_unmuted=
sound_only_person=
sound_only_one=
sound_there_are=
sound_other_in_party=
sound_place_into_conference=
sound_wait_for_leader=
sound_leader_has_left=
sound_get_pin=
sound_invalid_pin=
sound_locked=
sound_locked_now=
sound_unlocked_now=
sound_error_menu=

; ─── Listener Profile ───
; Members join muted — they only listen until they press PTT
[ptt_listener]
type=user
startmuted=yes
music_on_hold_when_empty=no
quiet=yes
announce_user_count=no
announce_join_leave=no
wait_marked=no
end_marked=no
dtmf_passthrough=yes
; Allow unmute via *1 (used when user presses PTT)
; This enables the SIP-level mute/unmute toggle

; ─── Talker Profile ───
; Active talker — mic is unmuted
[ptt_talker]
type=user
startmuted=no
music_on_hold_when_empty=no
quiet=yes
admin=no
marked=no
announce_user_count=no
announce_join_leave=no
dtmf_passthrough=yes
