; ===================================================================
; TexaCore PBX — Anonymous WebRTC Click-to-Call Endpoint
; File: pjsip_webrtc_guest.conf
; Include this in your main pjsip.conf:
;   #include pjsip_webrtc_guest.conf
; ===================================================================

; --- Transport (WSS must already be defined in main pjsip.conf) ---
; If not, uncomment:
; [transport-wss]
; type=transport
; protocol=wss
; bind=0.0.0.0
; local_net=10.0.0.0/8
; external_media_address=YOUR_PUBLIC_IP
; external_signaling_address=YOUR_PUBLIC_IP

; --- Guest Authentication ---
[webrtc-guest-auth]
type=auth
auth_type=userpass
username=webrtc_guest
password=TxC_W3bRTC_Gu3st_2026!

; --- Guest AOR (Address of Record) ---
[webrtc-guest-aor]
type=aor
max_contacts=100
remove_existing=no
minimum_expiration=30
default_expiration=120

; --- Guest Endpoint ---
[webrtc-guest]
type=endpoint
transport=transport-wss
context=click-to-call-context
auth=webrtc-guest-auth
aors=webrtc-guest-aor
disallow=all
allow=opus
allow=ulaw
allow=alaw
webrtc=yes
dtls_auto_generate_cert=yes
media_encryption=dtls
use_avpf=yes
ice_support=yes
media_use_received_transport=yes
rtcp_mux=yes
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
allow_subscribe=no
direct_media=no
; Anti-spam: limit concurrent calls per guest
device_state_busy_at=1
