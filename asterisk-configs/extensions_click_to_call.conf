; ===================================================================
; TexaCore PBX — Click-to-Call Dialplan (extensions.conf)
; Include this in your main extensions.conf:
;   #include extensions_click_to_call.conf
; ===================================================================

[click-to-call-context]
; --- Anti-Spam: Max 10 concurrent WebRTC guest calls ---
exten => _X.,1,NoOp(Click-to-Call from ${CHANNEL(peerip)} to ${EXTEN})
same  =>     n,Set(GROUP()=webrtc-guests)
same  =>     n,GotoIf($[${GROUP_COUNT(webrtc-guests)} > 10]?spam)
same  =>     n,Set(CHANNEL(language)=ar)

; --- Only allow calling extension 700 (IVR) ---
exten => 700,1,NoOp(WebRTC Guest calling IVR)
same  =>     n,Set(GROUP()=webrtc-guests)
same  =>     n,GotoIf($[${GROUP_COUNT(webrtc-guests)} > 10]?spam)
same  =>     n,Answer()
same  =>     n,Wait(0.5)
same  =>     n,Goto(ivr-main,s,1)

; --- Reject any other number ---
exten => _X.,n,Playback(ss-noservice)
same  =>     n,Hangup(CALL_REJECTED)

; --- Spam / Too many calls handler ---
exten => _X.,n(spam),Playback(all-circuits-busy-now)
same  =>     n,Hangup(INTERWORKING)

; --- Catch-all for invalid extensions ---
exten => i,1,Hangup(CALL_REJECTED)
exten => t,1,Hangup(NORMAL_CLEARING)
