; ══════════════════════════════════════════════════
; NexaTalkie — Dialplan for PTT Conference Rooms
; Add this to your main extensions.conf:
;   #include extensions_ptt.conf
; ══════════════════════════════════════════════════

[nexa-ptt]
; ────────────────────────────────────────────────
; PTT Conference Entry — Dynamic rooms
; Pattern: ptt_<room_hash>
; Users join as listeners (muted by default)
; ────────────────────────────────────────────────
exten => _ptt_.,1,NoOp(NexaTalkie: ${CALLERID(name)} joining PTT room ${EXTEN})
 same => n,Answer()
 same => n,Wait(0.2)
 same => n,Set(CONFROOM=${EXTEN})
 same => n,Set(CHANNEL(audioreadformat)=opus)
 same => n,Set(CHANNEL(audiowriteformat)=opus)
 ; Join as listener (muted) — unmute happens via SIP re-INVITE or DTMF
 same => n,ConfBridge(${CONFROOM},ptt_bridge,ptt_listener)
 same => n,Hangup()

; ────────────────────────────────────────────────
; PTT Talker Entry — For explicit talker join
; Pattern: ptttalk_<room_hash>
; Users join with mic open
; ────────────────────────────────────────────────
exten => _ptttalk_.,1,NoOp(NexaTalkie: ${CALLERID(name)} talking in PTT room ${EXTEN:8})
 same => n,Answer()
 same => n,Wait(0.1)
 same => n,Set(CONFROOM=ptt_${EXTEN:8})
 same => n,Set(CHANNEL(audioreadformat)=opus)
 same => n,Set(CHANNEL(audiowriteformat)=opus)
 same => n,ConfBridge(${CONFROOM},ptt_bridge,ptt_talker)
 same => n,Hangup()
