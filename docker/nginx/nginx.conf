# ════════════════════════════════════════════════════════════════
# 🔧 OpenResty (Nginx + Lua) Configuration — TexaCore Self-Hosted
# ════════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/openresty/error.log warn;
pid /run/openresty.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /usr/local/openresty/nginx/conf/mime.types;
    default_type application/octet-stream;

    # ── Logging ─────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/openresty/access.log main;

    # ── Performance ─────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # ── Gzip Compression ──────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Security Headers ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Shared Dictionary for License Cache ────────────────
    lua_shared_dict license_cache 1m;

    # ── Lua Package Path ──────────────────────────────────
    lua_package_path "/usr/local/openresty/nginx/conf/?.lua;;";

    server {
        listen 80;
        server_name _;
        root /usr/local/openresty/nginx/html;
        index index.html;

        # ── Health Check (no license needed) ──────────────
        location = /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"healthy","version":"__APP_VERSION__","timestamp":"$date_gmt"}';
        }

        # ── License Status Endpoint ───────────────────────
        location = /api/license/status {
            access_log off;
            content_by_lua_block {
                local cjson = require("cjson.safe")
                local file = io.open("/etc/texacore/license.json", "r")
                if not file then
                    ngx.status = 404
                    ngx.say(cjson.encode({activated = false}))
                    return
                end
                local content = file:read("*all")
                file:close()
                local data = cjson.decode(content)
                if data then
                    ngx.say(cjson.encode({
                        activated = true,
                        tier = data.tier,
                        expires_at = data.expires_at,
                        license_key = string.sub(data.license_key or "", 1, 8) .. "..."
                    }))
                else
                    ngx.status = 500
                    ngx.say(cjson.encode({error = "corrupt_license"}))
                end
            }
        }

        # ── License Guard (every request passes through) ──
        location / {
            access_by_lua_file /usr/local/openresty/nginx/conf/license-guard.lua;

            # SPA: try files, fallback to index.html
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
                try_files $uri =404;
            }
        }

        # ── API: reserved for future local REST proxy ──────
        # Currently the app connects directly via __TEXACORE_CONFIG__

        # ── Error Pages ───────────────────────────────────
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            internal;
        }
    }
}
