[general]
static=yes
writeprotect=no

[default]
; --- Internal Calls (1XX) ---
exten => _1XX,1,NoOp(Internal call to ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},30,tTrR)
 same => n,Hangup()

; --- TexaCore IVR (700) — Greeting then AI Agent ---
exten => 700,1,Answer()
 same => n,Playback(texacore-greeting)
 same => n,Goto(texacore-ai-agent,s,1)
 same => n,Hangup()

; --- Direct AI Agent Test (701) ---
exten => 701,1,Answer()
 same => n,Goto(texacore-ai-agent,s,1)
 same => n,Hangup()

; --- Echo Test (600) ---
exten => 600,1,Answer()
 same => n,Playback(texacore-greeting)
 same => n,Echo()
 same => n,Hangup()

; --- EuroFix IVR (800) ---
exten => 800,1,Answer()
 same => n,Set(TIMEOUT(response)=10)
 same => n,Set(TIMEOUT(digit)=3)
 same => n(ivr),Background(eurofix/ef-greeting)
 same => n,WaitExten(8)
 same => n,Goto(eurofix-ivr,0,1)

; Keep 001 as alias for EuroFix
exten => 001,1,Goto(default,800,1)

[eurofix-ivr]
exten => 1,1,NoOp(EuroFix: Sales)
 same => n,Set(CHANNEL(musicclass)=eurofix)
 same => n,Dial(PJSIP/101,20,tTm)
 same => n,Goto(eurofix-busy,s,1)

exten => 2,1,NoOp(EuroFix: Support)
 same => n,Set(CHANNEL(musicclass)=eurofix)
 same => n,Dial(PJSIP/102,20,tTm)
 same => n,Goto(eurofix-busy,s,1)

exten => 3,1,NoOp(EuroFix: Accounting)
 same => n,Set(CHANNEL(musicclass)=eurofix)
 same => n,Dial(PJSIP/103,20,tTm)
 same => n,Goto(eurofix-busy,s,1)

exten => 0,1,NoOp(EuroFix: Reception)
 same => n,Set(CHANNEL(musicclass)=eurofix)
 same => n,Dial(PJSIP/100,30,tTm)
 same => n,Goto(eurofix-busy,s,1)

exten => i,1,Playback(invalid)
 same => n,Goto(default,800,ivr)

exten => t,1,Goto(default,800,ivr)

[eurofix-busy]
exten => s,1,Playback(eurofix/ef-busy)
 same => n,VoiceMail(001@default,u)
 same => n,Hangup()

[eurofix-ooo]
exten => s,1,Answer()
 same => n,Playback(eurofix/ef-ooo)
 same => n,VoiceMail(001@default,u)
 same => n,Hangup()
#include "extensions_click_to_call.conf"

; ════════════════════════════════════════════
; ElevenLabs AI Agent Context
; Added: 2026-05-14
; ════════════════════════════════════════════
[texacore-ai-agent]
exten => s,1,NoOp(=== TexaCore AI Agent ===)
 same => n,Dial(PJSIP/380674848029@elevenlabs-endpoint,120,g)
 same => n,Hangup()

[from-elevenlabs]
exten => _X.,1,NoOp(=== From ElevenLabs ===)
 same => n,Answer()
 same => n,Dial(PJSIP/100,30,tTrR)
 same => n,Hangup()
